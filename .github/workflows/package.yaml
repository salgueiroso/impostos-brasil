name: "Package"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
env:
  DEFAULT_NODE_VERSION: 25.x
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true
jobs:
  Definitions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      DEFAULT_NODE_VERSION: ${{ env.DEFAULT_NODE_VERSION }}
    steps:
      - run: echo "Preparing definitions..."

  check-npm-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
          cache: "npm"

      - name: Instalar dependências do Node (sem instalar pacotes)
        run: npm ci

      - name: Obter versão do package.json
        id: version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Verificar se a versão já existe no NPM
        run: |
          echo "Verificando se a versão $VERSION já está publicada..."
          if npm view $(node -p "require('./package.json').name")@$VERSION version > /dev/null 2>&1; then
            echo "❌ A versão $VERSION já existe no NPM. Interrompendo pipeline."
            exit 1
          else
            echo "✅ Versão $VERSION ainda não publicada."
          fi
  Test:
    needs: [ Definitions, check-npm-version ]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
      id-token: write
    name: Testes (os ${{matrix.os}})(node v${{ matrix.node-version }})
    strategy:
      matrix:
        os: [ "ubuntu-latest" ] #, "macos-latest", "windows-latest" ]
        node-version:
          [
            # "20.x",
          # "22.x",
          # "24.x",
            "${{ needs.Definitions.outputs.DEFAULT_NODE_VERSION }}",
          ]
    steps:
      - uses: actions/checkout@v6
        name: Checkout
      - uses: actions/setup-node@v6
        name: Setup Node.js ${{ matrix.node-version }}
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Run npm ci
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Testes (os ${{matrix.os}})(node v${{ matrix.node-version }}) - Resultados
          path: reports/junit.xml
          reporter: jest-junit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          name: code-coverage-report-node-${{matrix.node-version}}
          files: ./coverage/lcov.info
          report_type: coverage
          verbose: true

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          name: test-results-node-${{matrix.node-version}}
          files: ./reports/junit.xml
          report_type: test_results
          verbose: true

  Build:
    needs: [ Test ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v6
        name: Checkout
      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
          cache: "npm"
      - name: Run npm ci
        run: npm ci
      - name: Run build
        run: npm run build
      - name: Run npm pack
        run: npm pack
      - name: Extract package
        run: tar -xvf *.tgz
      - name: Archive build
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "./package"

  Deploy:
    needs: [ Build, Definitions ]
    runs-on: ubuntu-latest
    environment: Producao
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package
      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: ${{ env.DEFAULT_NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - run: find .
        name: List package files
      - name: Run npm publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
